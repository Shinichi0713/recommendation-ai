<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeScript 簡易チャットアプリ</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: #f0f0f0;
    }
    h1 {
      text-align: center;
    }
    .user-setup {
      margin-bottom: 20px;
      padding: 10px;
      background: white;
      border-radius: 5px;
    }
    .user-setup input {
      padding: 5px 10px;
      margin-right: 10px;
    }
    .chat-area {
      background: white;
      border-radius: 5px;
      padding: 10px;
      margin-bottom: 10px;
      height: 400px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .message {
      margin-bottom: 10px;
      padding: 8px 12px;
      border-radius: 10px;
      max-width: 70%;
      word-wrap: break-word;
    }
    .message.own {
      align-self: flex-end;
      background: #007bff;
      color: white;
    }
    .message.other {
      align-self: flex-start;
      background: #e9ecef;
      color: black;
    }
    .message .sender {
      font-size: 0.8em;
      opacity: 0.7;
      margin-bottom: 2px;
    }
    .input-area {
      display: flex;
    }
    #messageInput {
      flex: 1;
      padding: 10px;
      font-size: 16px;
    }
    #sendBtn {
      padding: 10px 20px;
      margin-left: 10px;
      background: #28a745;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>簡易チャットアプリ（TypeScript）</h1>

  <div class="user-setup">
    <label>
      あなたの名前:
      <input type="text" id="userNameInput" placeholder="匿名">
    </label>
    <button id="setNameBtn">設定</button>
  </div>

  <div class="chat-area" id="chatArea"></div>

  <div class="input-area">
    <input type="text" id="messageInput" placeholder="メッセージを入力...">
    <button id="sendBtn">送信</button>
  </div>

  <script type="module" src="dist/chat-app.js"></script>
</body>
</html>
