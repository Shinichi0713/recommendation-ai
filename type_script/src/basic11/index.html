<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeScript お絵描きアプリ</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }
    .controls {
      margin-bottom: 10px;
    }
    button, input, select {
      margin-right: 10px;
      padding: 5px 10px;
    }
    canvas {
      border: 1px solid #ccc;
      background: white;
      cursor: crosshair;
      touch-action: none; /* タッチ操作のスクロールを防ぐ */
    }
  </style>
</head>
<body>
  <h1>お絵描きアプリ（TypeScript）</h1>

  <div class="controls">
    <label>
      ペンサイズ:
      <input type="range" id="penSize" min="1" max="50" value="5">
      <span id="penSizeValue">5</span>
    </label>

    <label>
      色:
      <input type="color" id="penColor" value="#000000">
    </label>

    <button id="eraserBtn">消しゴム</button>
    <button id="clearBtn">全消去</button>
    <button id="saveBtn">保存</button>
    <button id="loadBtn">復元</button>
  </div>

  <canvas id="canvas" width="800" height="600"></canvas>

  <script type="module" src="dist/drawing-app.js"></script>
</body>
</html>
